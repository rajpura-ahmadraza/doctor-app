name: clinixpro_patient
description: ClinixPro Patient App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # State management & navigation
  get: ^4.7.3
  provider: ^6.1.5+1

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  dotted_border: ^3.1.0
  smooth_page_indicator: ^2.0.1
  pin_code_fields: ^9.4.0

  # Auth
  local_auth: ^3.0.1

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  open_file: ^4.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
